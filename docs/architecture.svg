<svg viewBox="0 0 1000 1400" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#555" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="1400" fill="#ffffff"/>

  <text x="500" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#1a1a2e">CT-200 Document API — Architecture</text>

  <!-- PDF input -->
  <rect x="350" y="70" width="300" height="55" rx="8" fill="#e8eef9" stroke="#3b5bab" stroke-width="1.5"/>
  <text x="500" y="93" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a2e">CT-200 PDF Files</text>
  <text x="500" y="112" text-anchor="middle" font-size="11" fill="#555">ct200_manual_v1.pdf / v2.pdf</text>

  <line x1="500" y1="125" x2="500" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 2: Ingestion pipeline -->
  <rect x="120" y="150" width="760" height="180" rx="10" fill="#fbfbfd" stroke="#c7cbe0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="140" y="172" font-size="13" font-weight="700" fill="#5b3ba6">PHASE 2 — Ingestion &amp; Structuring</text>

  <rect x="150" y="185" width="180" height="50" rx="6" fill="#f1eaff" stroke="#7c4fd6" stroke-width="1.2"/>
  <text x="240" y="207" text-anchor="middle" font-size="12" font-weight="600">pdf_extract.py</text>
  <text x="240" y="222" text-anchor="middle" font-size="10" fill="#555">PyMuPDF text + fonts</text>

  <line x1="330" y1="210" x2="380" y2="210" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="385" y="185" width="180" height="50" rx="6" fill="#f1eaff" stroke="#7c4fd6" stroke-width="1.2"/>
  <text x="475" y="207" text-anchor="middle" font-size="12" font-weight="600">text_normalize.py</text>
  <text x="475" y="222" text-anchor="middle" font-size="10" fill="#555">fix ligature/encoding</text>

  <line x1="565" y1="210" x2="615" y2="210" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="620" y="185" width="180" height="50" rx="6" fill="#f1eaff" stroke="#7c4fd6" stroke-width="1.2"/>
  <text x="710" y="207" text-anchor="middle" font-size="12" font-weight="600">tree_builder.py</text>
  <text x="710" y="222" text-anchor="middle" font-size="10" fill="#555">regex heading detect</text>

  <line x1="710" y1="235" x2="710" y2="255" stroke="#555" stroke-width="1.2"/>
  <line x1="710" y1="255" x2="475" y2="255" stroke="#555" stroke-width="1.2"/>
  <line x1="475" y1="255" x2="475" y2="270" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="385" y="275" width="230" height="45" rx="6" fill="#e9ddff" stroke="#7c4fd6" stroke-width="1.4"/>
  <text x="500" y="302" text-anchor="middle" font-size="12" font-weight="700">ingest.py / run_ingest.py</text>

  <line x1="500" y1="320" x2="500" y2="350" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SQLite -->
  <rect x="260" y="350" width="480" height="90" rx="10" fill="#dff3e6" stroke="#2f8f57" stroke-width="1.6"/>
  <text x="500" y="375" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">SQLite — ct200.db</text>
  <text x="500" y="398" text-anchor="middle" font-size="11" fill="#333">DocumentVersion  |  Node</text>
  <text x="500" y="416" text-anchor="middle" font-size="11" fill="#333">Selection  |  SelectionItem</text>

  <line x1="500" y1="440" x2="500" y2="465" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 3 -->
  <rect x="120" y="465" width="760" height="90" rx="10" fill="#fbfbfd" stroke="#c7cbe0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="140" y="487" font-size="13" font-weight="700" fill="#b0521f">PHASE 3 — Version Matching &amp; Diff</text>
  <rect x="200" y="498" width="270" height="45" rx="6" fill="#ffe8d6" stroke="#c9701f" stroke-width="1.2"/>
  <text x="335" y="521" text-anchor="middle" font-size="12" font-weight="600">version_matcher.py</text>
  <text x="335" y="536" text-anchor="middle" font-size="10" fill="#555">heading_number-first, text fallback</text>

  <rect x="530" y="498" width="270" height="45" rx="6" fill="#ffe8d6" stroke="#c9701f" stroke-width="1.2"/>
  <text x="665" y="521" text-anchor="middle" font-size="12" font-weight="600">diff_summary.py</text>
  <text x="665" y="536" text-anchor="middle" font-size="10" fill="#555">difflib.unified_diff</text>

  <line x1="500" y1="555" x2="500" y2="580" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 4 -->
  <rect x="120" y="580" width="760" height="130" rx="10" fill="#fbfbfd" stroke="#c7cbe0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="140" y="602" font-size="13" font-weight="700" fill="#1b6ea3">PHASE 4 — Browse &amp; Selection APIs</text>

  <rect x="150" y="615" width="330" height="80" rx="6" fill="#dcefff" stroke="#1b6ea3" stroke-width="1.3"/>
  <text x="315" y="636" text-anchor="middle" font-size="12" font-weight="700">Browse API</text>
  <text x="315" y="653" text-anchor="middle" font-size="10" fill="#333">/browse/sections  /browse/nodes/{id}</text>
  <text x="315" y="668" text-anchor="middle" font-size="10" fill="#333">/browse/search  /browse/nodes/{id}/diff</text>
  <text x="315" y="685" text-anchor="middle" font-size="9" fill="#666">version="latest" resolves to max(DocumentVersion.id)</text>

  <rect x="510" y="615" width="330" height="80" rx="6" fill="#dcefff" stroke="#1b6ea3" stroke-width="1.3"/>
  <text x="675" y="636" text-anchor="middle" font-size="12" font-weight="700">Selection API</text>
  <text x="675" y="653" text-anchor="middle" font-size="10" fill="#333">POST /selections</text>
  <text x="675" y="668" text-anchor="middle" font-size="10" fill="#333">GET /selections/{id}</text>
  <text x="675" y="685" text-anchor="middle" font-size="9" fill="#666">pins (node_id, document_version_id) at creation</text>

  <line x1="675" y1="710" x2="675" y2="735" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 5 -->
  <rect x="120" y="735" width="760" height="430" rx="10" fill="#fbfbfd" stroke="#c7cbe0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="140" y="758" font-size="13" font-weight="700" fill="#a3234a">PHASE 5 — Generation, Staleness &amp; Retrieval</text>

  <rect x="490" y="770" width="330" height="55" rx="6" fill="#ffe0ea" stroke="#a3234a" stroke-width="1.3"/>
  <text x="655" y="793" text-anchor="middle" font-size="12" font-weight="700">Generation API</text>
  <text x="655" y="811" text-anchor="middle" font-size="10" fill="#333">POST /generations/selections/{id}</text>

  <line x1="655" y1="825" x2="655" y2="850" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="490" y="850" width="330" height="55" rx="6" fill="#ffe0ea" stroke="#a3234a" stroke-width="1.3"/>
  <text x="655" y="873" text-anchor="middle" font-size="12" font-weight="700">llm_client.py</text>
  <text x="655" y="891" text-anchor="middle" font-size="10" fill="#333">Hugging Face Inference API · retry-once</text>

  <line x1="655" y1="905" x2="655" y2="930" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="490" y="930" width="330" height="55" rx="6" fill="#ffe0ea" stroke="#a3234a" stroke-width="1.3"/>
  <text x="655" y="953" text-anchor="middle" font-size="12" font-weight="700">generation_store.py</text>
  <text x="655" y="971" text-anchor="middle" font-size="10" fill="#333">data/generations.json (flat-file NoSQL)</text>

  <line x1="655" y1="985" x2="655" y2="1010" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="490" y="1010" width="330" height="55" rx="6" fill="#ffe0ea" stroke="#a3234a" stroke-width="1.3"/>
  <text x="655" y="1033" text-anchor="middle" font-size="12" font-weight="700">staleness.py</text>
  <text x="655" y="1051" text-anchor="middle" font-size="10" fill="#333">compares hash vs. latest version via version_matcher</text>

  <!-- feedback line from version_matcher (phase3) into staleness -->
  <line x1="335" y1="543" x2="335" y2="1037" stroke="#c9701f" stroke-width="1.3" stroke-dasharray="3,3"/>
  <line x1="335" y1="1037" x2="488" y2="1037" stroke="#c9701f" stroke-width="1.3" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <text x="200" y="1032" font-size="9" fill="#c9701f" font-style="italic">reused from Phase 3</text>

  <line x1="655" y1="1065" x2="655" y2="1090" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="490" y="1090" width="330" height="55" rx="6" fill="#f7d9e3" stroke="#a3234a" stroke-width="1.5"/>
  <text x="655" y="1113" text-anchor="middle" font-size="12" font-weight="700">Retrieval API</text>
  <text x="655" y="1131" text-anchor="middle" font-size="10" fill="#333">GET /generations?selection_id=... / ?node_id=...</text>

  <!-- Legend -->
  <rect x="150" y="770" width="280" height="150" rx="8" fill="#ffffff" stroke="#ddd" stroke-width="1"/>
  <text x="165" y="792" font-size="11" font-weight="700" fill="#333">Key properties</text>
  <text x="165" y="812" font-size="10" fill="#444">• Re-ingestion never deletes prior versions</text>
  <text x="165" y="830" font-size="10" fill="#444">• Selections pin exact (node, version)</text>
  <text x="165" y="848" font-size="10" fill="#444">• Retry-once-then-fail on malformed LLM JSON</text>
  <text x="165" y="866" font-size="10" fill="#444">• Duplicate selection submit → returns</text>
  <text x="180" y="882" font-size="10" fill="#444">existing generation (no re-call)</text>
  <text x="165" y="900" font-size="10" fill="#444">• Staleness = binary content_hash diff</text>
  <text x="180" y="915" font-size="9" fill="#888" font-style="italic">(known limitation — see Decision Log)</text>

  <text x="500" y="1370" text-anchor="middle" font-size="10" fill="#999">CT-200 Document API — Tri9T AI Internship Assignment</text>
</svg>
